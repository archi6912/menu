<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — Навигация</title>
    <style>
        :root { --bg: #f8f9fa; --accent: #d35400; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; scroll-behavior: smooth; }
        
        /* Кнопки навигации */
        .nav-container { position: sticky; top: 10px; display: flex; gap: 10px; margin-bottom: 20px; z-index: 100; }
        .nav-btn { background: var(--accent); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .category-title { font-size: 22px; margin: 30px 0 15px; border-left: 5px solid var(--accent); padding-left: 10px; }
        .menu-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #eee; } /* Заглушка, если фото нет */
        .item-info { display: flex; justify-content: space-between; align-items: baseline; }
        .item-name { font-weight: bold; font-size: 18px; }
        .item-price { color: var(--accent); font-weight: bold; }
        .item-desc { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="nav-container">
    <a href="#food" class="nav-btn">🍴 Еда</a>
    <a href="#drinks" class="nav-btn">☕ Напитки</a>
</div>

<h2 id="food" class="category-title">Еда</h2>

<div class="menu-item">
    <img src="tvorog.jpg" class="item-img" alt="Творог">
    <div class="item-info">
        <span class="item-name">Творог с киви</span>
        <span class="item-price">220 ₽</span>
    </div>
    <div class="item-desc">Домашний творог, свежий киви и семечки тыквы.</div>
</div>

<h2 id="drinks" class="category-title">Напитки</h2>

<div class="menu-item">
    <img src="coffee.jpg" class="item-img" alt="Кофе">
    <div class="item-info">
        <span class="item-name">Капучино</span>
        <span class="item-price">180 ₽</span>
    </div>
    <div class="item-desc">Классический кофе с густой молочной пенкой.</div>
</div>

</body>
</html>
