<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Змейка · 3310</title>
<style>
  /* Ретро-LCD в духе Nokia 3310 — там, где змейка родилась */
  :root {
    --lcd: #aebd8c;        /* подсветка экрана */
    --lcd-dim: #a2b180;    /* сетка пикселей */
    --pixel: #23301c;      /* «чернила» LCD */
    --pixel-soft: #44523a; /* полупогасший пиксель */
    --shell: #1d1f24;      /* корпус телефона */
    --shell-hi: #2b2e35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 50% 20%, #33363e, var(--shell) 70%);
    display: flex; align-items: center; justify-content: center;
    font-family: "Courier New", monospace;
    -webkit-user-select: none; user-select: none;
    touch-action: none; overflow: hidden;
  }

  .phone {
    background: linear-gradient(160deg, var(--shell-hi), var(--shell));
    border-radius: 26px 26px 34px 34px;
    padding: 18px 16px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.07);
    width: min(94vw, 400px);
  }
  .brand {
    text-align: center; color: #8e93a0; letter-spacing: .45em;
    font-size: 10px; text-transform: uppercase; margin-bottom: 10px;
  }

  .lcd {
    background: var(--lcd);
    border-radius: 10px;
    padding: 10px;
    box-shadow: inset 0 4px 14px rgba(0,0,0,.35), inset 0 0 0 2px rgba(0,0,0,.18);
    position: relative;
  }
  /* пиксельная сетка поверх экрана */
  .lcd::after {
    content: ''; position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
    background:
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(35,48,28,.05) 3px 4px),
      repeating-linear-gradient(90deg, transparent 0 3px, rgba(35,48,28,.05) 3px 4px);
  }

  .hud {
    display: flex; justify-content: space-between;
    color: var(--pixel); font-weight: bold; font-size: 14px;
    padding: 2px 2px 8px; letter-spacing: .08em;
  }
  canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }

  .overlay {
    position: absolute; inset: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: var(--pixel); text-align: center; background: rgba(174,189,140,.88);
    border-radius: 8px; z-index: 2;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 24px; letter-spacing: .15em; }
  .overlay p  { font-size: 12px; line-height: 1.7; }
  .overlay .blink { animation: blink 1.1s steps(2) infinite; font-weight: bold; }
  @keyframes blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .overlay .blink { animation: none; } }

  /* кнопки управления для телефона */
  .pad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 16px;
  }
  .pad button {
    font-family: inherit; font-size: 20px; font-weight: bold;
    color: #cfd3dc; background: linear-gradient(180deg, #3a3e47, #24272e);
    border: none; border-radius: 12px; padding: 13px 0;
    box-shadow: 0 4px 0 #14161a; cursor: pointer;
  }
  .pad button:active { transform: translateY(3px); box-shadow: 0 1px 0 #14161a; }
  .pad .up    { grid-column: 2; }
  .pad .left  { grid-column: 1; grid-row: 2; }
  .pad .down  { grid-column: 2; grid-row: 2; }
  .pad .right { grid-column: 3; grid-row: 2; }
  @media (hover: hover) and (pointer: fine) { .pad { display: none; } } /* на десктопе — клавиатура */
</style>
</head>
<body>
<div class="phone">
  <div class="brand">Snake · 3310</div>
  <div class="lcd">
    <div class="hud"><span id="score">0000</span><span id="best">REC 0000</span></div>
    <canvas id="game" width="260" height="260"></canvas>
    <div class="overlay" id="overlay">
      <h1>ЗМЕЙКА</h1>
      <p>Стрелки / WASD / свайп<br>Съешь точку — не съешь себя</p>
      <p class="blink" id="overlayAction">НАЖМИ, ЧТОБЫ НАЧАТЬ</p>
    </div>
  </div>
  <div class="pad">
    <button class="up"    data-dir="up">▲</button>
    <button class="left"  data-dir="left">◀</button>
    <button class="down"  data-dir="down">▼</button>
    <button class="right" data-dir="right">▶</button>
  </div>
</div>

<script>
(() => {
  const CELL = 13, GRID = 20;                 // 20×20 клеток по 13px
  const cv = document.getElementById('game');
  const cx = cv.getContext('2d');
  const elScore = document.getElementById('score');
  const elBest  = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayAction = document.getElementById('overlayAction');
  const css = getComputedStyle(document.documentElement);
  const INK  = css.getPropertyValue('--pixel').trim();
  const SOFT = css.getPropertyValue('--pixel-soft').trim();

  const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  let snake, dir, nextDir, food, score, best = 0, alive = false, timer = null, speed;

  const fmt = n => String(n).padStart(4, '0');

  function reset() {
    snake = [[9,10],[8,10],[7,10]];
    dir = 'right'; nextDir = 'right';
    score = 0; speed = 160;
    placeFood();
    draw();
  }

  function placeFood() {
    do {
      food = [Math.floor(Math.random()*GRID), Math.floor(Math.random()*GRID)];
    } while (snake.some(([x,y]) => x === food[0] && y === food[1]));
  }

  function cell(x, y, color) {
    // «пиксель» с зазором, как на матричном LCD
    cx.fillStyle = color;
    cx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
  }

  function draw() {
    cx.clearRect(0, 0, cv.width, cv.height);
    // рамка поля
    cx.strokeStyle = SOFT; cx.lineWidth = 1;
    cx.strokeRect(.5, .5, cv.width-1, cv.height-1);
    // еда мигает «полупикселем»
    cell(food[0], food[1], INK);
    cx.clearRect(food[0]*CELL+5, food[1]*CELL+5, CELL-10, CELL-10);
    // змейка: голова темнее
    snake.forEach(([x,y], i) => cell(x, y, i === 0 ? INK : SOFT));
  }

  function step() {
    dir = nextDir;
    const [dx, dy] = DIRS[dir];
    const head = [snake[0][0]+dx, snake[0][1]+dy];

    const hitWall = head[0] < 0 || head[1] < 0 || head[0] >= GRID || head[1] >= GRID;
    const hitSelf = snake.some(([x,y]) => x === head[0] && y === head[1]);
    if (hitWall || hitSelf) return gameOver();

    snake.unshift(head);
    if (head[0] === food[0] && head[1] === food[1]) {
      score += 10;
      elScore.textContent = fmt(score);
      placeFood();
      if (speed > 70) {                       // ускоряемся с каждым яблоком
        speed -= 4;
        clearInterval(timer);
        timer = setInterval(step, speed);
      }
    } else {
      snake.pop();
    }
    draw();
  }

  function start() {
    reset();
    elScore.textContent = fmt(0);
    overlay.classList.add('hidden');
    alive = true;
    clearInterval(timer);
    timer = setInterval(step, speed);
  }

  function gameOver() {
    alive = false;
    clearInterval(timer);
    if (score > best) { best = score; elBest.textContent = 'REC ' + fmt(best); }
    overlay.querySelector('h1').textContent = 'ИГРА ОКОНЧЕНА';
    overlay.querySelector('p').innerHTML = 'Счёт: <b>' + score + '</b><br>Рекорд: <b>' + best + '</b>';
    overlayAction.textContent = 'НАЖМИ, ЧТОБЫ СЫГРАТЬ ЕЩЁ';
    overlay.classList.remove('hidden');
  }

  function turn(d) {
    if (!alive) return;
    // запрет разворота на 180°
    const opposite = { up:'down', down:'up', left:'right', right:'left' };
    if (d !== opposite[dir]) nextDir = d;
  }

  // клавиатура
  addEventListener('keydown', e => {
    const map = {
      ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
      KeyW:'up', KeyS:'down', KeyA:'left', KeyD:'right'
    };
    if (map[e.code]) { e.preventDefault(); alive ? turn(map[e.code]) : start(); }
    if (e.code === 'Space' && !alive) start();
  });

  // экранные кнопки
  document.querySelectorAll('.pad button').forEach(b =>
    b.addEventListener('pointerdown', () => alive ? turn(b.dataset.dir) : start())
  );

  // свайпы по экрану
  let t0 = null;
  addEventListener('touchstart', e => { t0 = [e.touches[0].clientX, e.touches[0].clientY]; }, { passive: true });
  addEventListener('touchend', e => {
    if (!t0) return;
    const dx = e.changedTouches[0].clientX - t0[0];
    const dy = e.changedTouches[0].clientY - t0[1];
    t0 = null;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;     // слишком короткий свайп
    turn(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  }, { passive: true });

  overlay.addEventListener('pointerdown', () => { if (!alive) start(); });

  reset();
})();
</script>
</body>
</html>
